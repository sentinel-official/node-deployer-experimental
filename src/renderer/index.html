<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <!--
      CSP: only `self` for scripts/connects. Tailwind JIT injects inline
      <style> blocks so `style-src` needs `unsafe-inline`, but `script-src`
      is strictly `self`. The renderer never does external `fetch`; all
      RPC traffic happens in main.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self' data:; img-src 'self' data:; connect-src 'self';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sentinel dVPN</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
